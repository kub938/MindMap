events {}

http {
  # HTTP → HTTPS 리다이렉트
  server {
    listen 80;
    server_name mindnote.shop www.mindnote.shop;

    return 301 https://$host$request_uri;
  }

  # HTTPS 서버
  server {
    listen 443 ssl;
    server_name mindnote.shop www.mindnote.shop;

    ssl_certificate /etc/letsencrypt/live/mindnote.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mindnote.shop/privkey.pem;

    location / {
      proxy_pass http://web:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
      proxy_pass http://api:4000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}